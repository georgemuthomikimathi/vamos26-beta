  <path d="M160 20 C100 20 55 70 40 130 C55 90 100 55 160 55 C220 55 265 90 280 130 C265 70 220 20 160 20Z" fill="url(#usa)" opacity="0.85"/>
  <path d="M160 55 C120 55 85 80 70 115 C90 85 125 65 160 65 C195 65 230 85 250 115 C235 80 200 55 160 55Z" fill="#ffffff" opacity="0.15"/>
  <!-- Panel 2 - Canada red -->
  <path d="M280 130 C295 175 285 230 250 270 C270 230 280 185 275 145 Z" fill="url(#can)" opacity="0.85"/>
  <path d="M40 130 C25 175 35 230 70 270 C50 230 40 185 45 145 Z" fill="url(#can)" opacity="0.85"/>
  <!-- Panel 3 - Mexico green -->
  <path d="M70 270 C100 300 130 310 160 310 C190 310 220 300 250 270 C220 295 190 305 160 305 C130 305 100 295 70 270Z" fill="url(#mex)" opacity="0.85"/>
  <!-- Center triangle - three nations -->
  <path d="M160 100 L120 200 L200 200 Z" fill="none" stroke="url(#goldAccent)" stroke-width="3"/>
  <path d="M160 115 L135 190 L185 190 Z" fill="url(#goldAccent)" opacity="0.2"/>
  <!-- Host icons -->
  <text x="160" y="145" text-anchor="middle" font-size="18" fill="#ffffff" font-weight="bold"></text>
  <text x="130" y="185" text-anchor="middle" font-size="14" fill="#ffffff"><A</text>
  <text x="190" y="185" text-anchor="middle" font-size="14" fill="#ffffff">>�</text>
  <!-- TRIONDA label -->
  <text x="160" y="255" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a2a8a" letter-spacing="3" font-family="sans-serif">TRIONDA</text>
  <!-- Seam lines -->
  <path d="M40 130 Q160 160 280 130" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.4"/>
  <path d="M70 270 Q160 200 250 270" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.4"/>
  <path d="M160 20 Q160 160 160 310" fill="none" stroke="#64748b" stroke-width="1.5" opacity="0.3"/>
