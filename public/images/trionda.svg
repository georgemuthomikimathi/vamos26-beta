<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" fill="none">
  <defs>
    <radialGradient id="ballBase" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#c8d0dc"/>
    </radialGradient>
    <linearGradient id="usa" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3C5BFF"/>
      <stop offset="100%" stop-color="#1a2a8a"/>
    </linearGradient>
    <linearGradient id="can" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2D2D"/>
      <stop offset="100%" stop-color="#aa0000"/>
    </linearGradient>
    <linearGradient id="mex" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A651"/>
      <stop offset="100%" stop-color="#006b35"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#B8860B"/>
    </linearGradient>
    <filter id="ballGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="160" cy="160" r="148" fill="url(#ballBase)" filter="url(#ballGlow)"/>
  <circle cx="160" cy="160" r="148" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
